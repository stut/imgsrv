# nginx config for the combined imgsrv container: nginx on :80 serves cache
# hits from disk and proxies misses to the imgsrv binary on 127.0.0.1:8080.
# The host→directory mapping and the URL shape gate live in
# /etc/nginx/imgsrv.conf, which is nginx.conf.example copied in at build time.

user nginx;
worker_processes auto;
pid /run/nginx.pid;

error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    # Only derivative images are ever served statically, so the full
    # mime.types table isn't needed.
    types {
        image/webp webp;
        image/avif avif;
        image/jpeg jpg jpeg;
        image/x-icon ico;
    }
    default_type application/octet-stream;

    access_log /dev/stdout;
    sendfile on;

    include /etc/nginx/imgsrv.conf;
}
